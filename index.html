<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Yamani Food — Menu interactif</title>
  <style>
    :root{
      --menu-url:url("https://i.postimg.cc/tCnNnsh2/Whats-App-Image-2026-04-15-at-17-19-13.jpg");
      --menu-ratio:0.66625; /* largeur / hauteur */

      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);

      --app-h:100vh;

      --text:#ffffff;
      --muted:rgba(255,255,255,.82);
      --border:rgba(255,255,255,.16);
      --shadow:0 14px 34px rgba(0,0,0,.24);
      --shadow-strong:0 24px 60px rgba(0,0,0,.34);

      /* warm background tones */
      --page-bg:#eadcc7;
      --page-bg-2:#f3e9d8;
      --page-bg-3:#d9c3a2;
      --page-edge:#e8d7bf;
      --page-shadow:rgba(113, 73, 28, .10);

      /* Mobile first compact bottom UI */
      --ui-side:10px;
      --ui-gap:7px;
      --cart-h:74px;
      --wa-h:50px;
      --bottom-ui-total:calc(var(--cart-h) + var(--wa-h) + var(--ui-gap) + 10px + var(--safe-bottom));

      /* image placement */
      --menu-top-offset:calc(var(--safe-top) + 2px);
      --menu-bottom-clearance:calc(var(--bottom-ui-total) - 12px);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,.45), transparent 28%),
        radial-gradient(circle at 50% 120%, rgba(183,132,60,.12), transparent 34%),
        linear-gradient(180deg, var(--page-bg-2) 0%, var(--page-bg) 58%, #e3d0b3 100%);
      color:var(--text);
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body{
      position:relative;
      touch-action:manipulation;
      overscroll-behavior:none;
    }

    button,input,textarea,select{
      font:inherit;
    }

    /* =========================
       INTRO
    ========================= */
    .intro{
      position:fixed;
      inset:0;
      z-index:9999;
      display:grid;
      place-items:center;
      padding:
        calc(16px + var(--safe-top))
        calc(16px + var(--safe-right))
        calc(18px + var(--safe-bottom))
        calc(16px + var(--safe-left));
      background:
        radial-gradient(circle at 18% 20%, rgba(255,255,255,.13), transparent 24%),
        radial-gradient(circle at 84% 26%, rgba(255,210,90,.14), transparent 18%),
        radial-gradient(circle at 50% 100%, rgba(255,255,255,.08), transparent 20%),
        linear-gradient(140deg, #5b1f8f 0%, #281149 44%, #13091f 100%);
      transition:opacity .8s ease, visibility .8s ease;
    }

    .intro.hide{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .intro-card{
      width:min(100%, 420px);
      padding:18px 14px 16px;
      border-radius:26px;
      background:linear-gradient(180deg, rgba(255,255,255,.13), rgba(255,255,255,.07));
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 25px 60px rgba(0,0,0,.28);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
    }

    .intro-title{
      margin:0;
      font-size:clamp(1.28rem, 5vw, 1.95rem);
      font-weight:900;
      text-align:center;
      letter-spacing:.02em;
    }

    .intro-sub{
      margin:7px 0 14px;
      text-align:center;
      color:rgba(255,255,255,.86);
      font-size:.94rem;
      line-height:1.42;
    }

    .runway{
      position:relative;
      width:100%;
      height:96px;
      border-radius:999px;
      overflow:hidden;
      background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
      border:1px solid rgba(255,255,255,.12);
      box-shadow:var(--shadow);
    }

    .runway::before{
      content:"";
      position:absolute;
      left:8%;
      right:8%;
      bottom:18px;
      height:7px;
      border-radius:999px;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.55), transparent);
      opacity:.55;
      filter:blur(.4px);
    }

    .chef{
      position:absolute;
      left:-84px;
      bottom:15px;
      width:82px;
      height:82px;
      animation:
        chefWalk 2.7s cubic-bezier(.52,.01,.25,1) forwards,
        chefBounce .62s ease-in-out infinite;
      transform-origin:center bottom;
      filter:drop-shadow(0 10px 16px rgba(0,0,0,.35));
    }

    .chef .emoji{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      font-size:60px;
      line-height:1;
      animation:chefTilt .78s ease-in-out infinite alternate;
    }

    .chef .steam{
      position:absolute;
      left:52px;
      top:-8px;
      width:24px;
      height:34px;
    }

    .chef .steam span{
      position:absolute;
      bottom:0;
      width:7px;
      height:24px;
      border-radius:999px;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.82));
      filter:blur(1px);
      opacity:0;
      animation:steamUp 1.1s linear infinite;
    }

    .chef .steam span:nth-child(1){left:0; animation-delay:.08s;}
    .chef .steam span:nth-child(2){left:8px; animation-delay:.32s;}
    .chef .steam span:nth-child(3){left:16px; animation-delay:.56s;}

    .loading{
      display:flex;
      justify-content:center;
      gap:9px;
      padding-top:13px;
    }

    .loading span{
      width:8px;
      height:8px;
      border-radius:50%;
      background:#fff;
      opacity:.3;
      box-shadow:0 0 14px rgba(255,255,255,.25);
      animation:dotPulse 1s ease-in-out infinite;
    }

    .loading span:nth-child(2){animation-delay:.16s}
    .loading span:nth-child(3){animation-delay:.32s}

    @keyframes chefWalk{
      from{ left:-84px; }
      to{ left:calc(100% - 70px); }
    }
    @keyframes chefBounce{
      0%,100%{ transform:translateY(0) scale(1); }
      50%{ transform:translateY(-7px) scale(1.02); }
    }
    @keyframes chefTilt{
      from{ transform:rotate(-4deg); }
      to{ transform:rotate(4deg); }
    }
    @keyframes steamUp{
      0%{ transform:translateY(10px) scaleY(.7); opacity:0; }
      22%{ opacity:.7; }
      100%{ transform:translateY(-16px) scaleY(1.15); opacity:0; }
    }
    @keyframes dotPulse{
      0%,100%{ transform:scale(.9); opacity:.25; }
      50%{ transform:scale(1.25); opacity:1; }
    }

    /* =========================
       APP
    ========================= */
    .app{
      position:fixed;
      inset:0;
      width:100vw;
      height:var(--app-h);
      opacity:0;
      transform:scale(1.01);
      transition:opacity .85s ease, transform .85s ease;
      background:
        radial-gradient(circle at 50% 12%, rgba(255,255,255,.36), transparent 26%),
        linear-gradient(180deg, var(--page-bg-2) 0%, var(--page-bg) 62%, #e1cfb2 100%);
    }

    .app.ready{
      opacity:1;
      transform:scale(1);
    }

    .stage{
      position:relative;
      width:100vw;
      height:var(--app-h);
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 18%, rgba(255,255,255,.26), transparent 30%),
        linear-gradient(180deg, #f1e6d4 0%, #e7d7bf 52%, #e1cfb2 100%);
    }

    .stage::before{
      content:"";
      position:absolute;
      inset:0;
      z-index:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 48%, rgba(168,120,49,.08), transparent 34%),
        linear-gradient(90deg, rgba(243,233,216,.96), rgba(243,233,216,.28) 13%, rgba(243,233,216,0) 24%, rgba(243,233,216,0) 76%, rgba(243,233,216,.28) 87%, rgba(243,233,216,.96) 100%);
    }

    .menu-bg,
    .image-frame{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      width:min(100vw, calc((var(--app-h) - var(--menu-top-offset) - var(--menu-bottom-clearance)) * var(--menu-ratio)));
      height:min(
        calc(var(--app-h) - var(--menu-top-offset) - var(--menu-bottom-clearance)),
        calc(100vw / var(--menu-ratio))
      );
    }

    .menu-bg{
      top:var(--menu-top-offset);
      z-index:1;
      background-image:var(--menu-url);
      background-repeat:no-repeat;
      background-position:center top;
      background-size:100% 100%;
      filter:drop-shadow(0 18px 36px rgba(120, 79, 28, .12));
    }

    .menu-bg::before{
      content:"";
      position:absolute;
      inset:-22px -28px;
      z-index:-1;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 46%, rgba(255,236,205,.78), rgba(255,236,205,.24) 40%, transparent 70%);
      filter:blur(20px);
      opacity:.75;
    }

    .image-frame{
      top:var(--menu-top-offset);
      z-index:3;
      pointer-events:none;
      perspective:1200px;
      transform:translateX(-50%) translateZ(0);
    }

    .menu-safe-fade{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:calc(var(--bottom-ui-total) + 8px);
      z-index:2;
      pointer-events:none;
      background:linear-gradient(to top, rgba(236,223,201,.72), rgba(236,223,201,.24) 46%, rgba(236,223,201,0));
    }

    .mobile-side-blend{
      position:absolute;
      inset:0;
      z-index:2;
      pointer-events:none;
      background:
        linear-gradient(90deg, rgba(238,226,205,.92) 0%, rgba(238,226,205,0) 10%, rgba(238,226,205,0) 90%, rgba(238,226,205,.92) 100%);
      opacity:.68;
    }

    /* =========================
       HOTSPOTS
    ========================= */
    .hotspot{
      position:absolute;
      pointer-events:auto;
      border:none;
      padding:0;
      background:transparent;
      border-radius:18px;
      cursor:pointer;
      outline:none;
      transform-style:preserve-3d;
      transition:
        transform .2s ease,
        filter .2s ease,
        box-shadow .2s ease,
        background .2s ease;
      will-change:transform;
      isolation:isolate;
      overflow:visible;
      transform:translateZ(0);
      backface-visibility:hidden;
      -webkit-backface-visibility:hidden;
      --rx: 0deg;
      --ry: 0deg;
      --idle-lift: 0px;
      --float-y: 0px;
      --float-scale: 1;
      --piece-radius: 18px;
      --piece-opacity: 1;
      --piece-shadow: drop-shadow(0 10px 16px rgba(0,0,0,.10));
    }

    .hotspot::before{
      content:"";
      position:absolute;
      inset:-2px;
      border-radius:var(--piece-radius);
      background-image:var(--menu-url);
      background-repeat:no-repeat;
      background-size:calc(var(--bg-wx, 100%) + 4px) calc(var(--bg-hy, 100%) + 4px);
      background-position:calc(var(--bg-x, 0px) - 2px) calc(var(--bg-y, 0px) - 2px);
      transform:
        perspective(1100px)
        translate3d(0, var(--float-y), 0)
        rotateX(calc(var(--rx) * .45))
        rotateY(calc(var(--ry) * .55))
        scale(var(--float-scale))
        translateZ(0);
      transform-origin:center center;
      opacity:var(--piece-opacity);
      filter:var(--piece-shadow);
      transition:
        transform .34s cubic-bezier(.2,.7,.2,1),
        filter .34s ease,
        opacity .24s ease;
      will-change:transform, filter;
      z-index:1;
      pointer-events:none;
      backface-visibility:hidden;
      -webkit-backface-visibility:hidden;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.03);
    }

    .hotspot::after{
      content:"";
      position:absolute;
      inset:-4px;
      border-radius:calc(var(--piece-radius) + 4px);
      background:
        radial-gradient(circle at 50% 50%, rgba(255,224,150,.24), transparent 70%);
      opacity:.0;
      filter:blur(10px);
      transition:opacity .28s ease, transform .28s ease;
      z-index:0;
      pointer-events:none;
    }

    .hotspot .interactive-ring{
      display:none;
    }

    .hotspot > span{
      display:none;
    }

    .hotspot--main{
      animation:hotspotPresence 4.8s ease-in-out infinite;
      --piece-shadow:
        drop-shadow(0 8px 14px rgba(0,0,0,.10))
        drop-shadow(0 0 0 rgba(255,214,120,0));
    }

    .hotspot--main::before{
      animation:dishFloat 4.8s ease-in-out infinite;
    }

    .hotspot--main::after{
      animation:dishGlow 4.8s ease-in-out infinite;
    }

    .hotspot--sauce{
      animation:hotspotPresenceSoft 5.8s ease-in-out infinite;
      --piece-shadow:
        drop-shadow(0 5px 10px rgba(0,0,0,.08))
        drop-shadow(0 0 0 rgba(168,255,168,0));
    }

    .hotspot--sauce::before{
      animation:sauceFloat 5.8s ease-in-out infinite;
    }

    .hotspot--sauce::after{
      animation:sauceGlow 5.8s ease-in-out infinite;
    }

    @keyframes hotspotPresence{
      0%,100%{
        transform:translateZ(0);
      }
      50%{
        transform:translate3d(0,-1px,0);
      }
    }

    @keyframes hotspotPresenceSoft{
      0%,100%{
        transform:translateZ(0);
      }
      50%{
        transform:translate3d(0,-.5px,0);
      }
    }

    @keyframes dishFloat{
      0%,100%{
        transform:
          perspective(1100px)
          translate3d(0, 0px, 0)
          rotateX(-1.2deg)
          rotateY(1.1deg)
          scale(1);
        filter:
          drop-shadow(0 8px 14px rgba(0,0,0,.10))
          drop-shadow(0 0 0 rgba(255,214,120,0));
      }
      25%{
        transform:
          perspective(1100px)
          translate3d(0, -1.5px, 0)
          rotateX(-1.8deg)
          rotateY(1.8deg)
          scale(1.011);
      }
      50%{
        transform:
          perspective(1100px)
          translate3d(0, -2.5px, 0)
          rotateX(-2.2deg)
          rotateY(-1.8deg)
          scale(1.019);
        filter:
          drop-shadow(0 12px 18px rgba(0,0,0,.14))
          drop-shadow(0 0 10px rgba(255,215,110,.12));
      }
      75%{
        transform:
          perspective(1100px)
          translate3d(0, -1.2px, 0)
          rotateX(-1.6deg)
          rotateY(-1.1deg)
          scale(1.01);
      }
    }

    @keyframes sauceFloat{
      0%,100%{
        transform:
          perspective(900px)
          translate3d(0, 0px, 0)
          rotateX(-.8deg)
          rotateY(.7deg)
          scale(1);
      }
      50%{
        transform:
          perspective(900px)
          translate3d(0, -1.2px, 0)
          rotateX(-1.3deg)
          rotateY(-.8deg)
          scale(1.01);
      }
    }

    @keyframes dishGlow{
      0%,100%{
        opacity:.10;
        transform:scale(.985);
      }
      50%{
        opacity:.38;
        transform:scale(1.02);
      }
    }

    @keyframes sauceGlow{
      0%,100%{
        opacity:.06;
        transform:scale(.99);
      }
      50%{
        opacity:.18;
        transform:scale(1.012);
      }
    }

    .hotspot:active,
    .hotspot.active{
      transform:translateY(-1px) scale(1.01);
      filter:drop-shadow(0 8px 14px rgba(0,0,0,.12));
      animation:none;
    }

    .hotspot:active::before,
    .hotspot.active::before{
      animation:none;
      transform:
        perspective(1200px)
        translate3d(0, -2px, 0)
        rotateX(-2deg)
        rotateY(2deg)
        scale(1.022);
      filter:
        drop-shadow(0 13px 20px rgba(0,0,0,.16))
        drop-shadow(0 0 12px rgba(255,214,120,.18));
    }

    .hotspot:active::after,
    .hotspot.active::after{
      opacity:.42;
      transform:scale(1.03);
      animation:none;
    }

    @media (hover:hover) and (pointer:fine){
      .hotspot:hover{
        transform:translateY(-1px) scale(1.008);
        filter:drop-shadow(0 10px 14px rgba(0,0,0,.12));
        animation:none;
      }
      .hotspot:hover::before{
        animation:none;
        transform:
          perspective(1200px)
          translate3d(0, -2px, 0)
          rotateX(calc(var(--rx) * .65 + -2deg))
          rotateY(calc(var(--ry) * .8 + 2deg))
          scale(1.024);
        filter:
          drop-shadow(0 13px 20px rgba(0,0,0,.16))
          drop-shadow(0 0 12px rgba(255,214,120,.16));
      }
      .hotspot:hover::after{
        opacity:.44;
        transform:scale(1.035);
        animation:none;
      }
    }

    /* =========================
       MODAL
    ========================= */
    .modal{
      position:fixed;
      inset:0;
      z-index:50;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      padding:
        calc(8px + var(--safe-top))
        calc(10px + var(--safe-right))
        calc(10px + var(--safe-bottom))
        calc(10px + var(--safe-left));
      background:rgba(10,8,16,.42);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      opacity:0;
      visibility:hidden;
      pointer-events:none;
      transition:opacity .24s ease, visibility .24s ease;
    }

    .modal.open{
      opacity:1;
      visibility:visible;
      pointer-events:auto;
    }

    .modal-card{
      position:relative;
      width:min(100%, 460px);
      border-radius:24px;
      padding:16px 14px 14px;
      background:linear-gradient(180deg, rgba(255,255,255,.20), rgba(255,255,255,.11));
      border:1px solid rgba(255,255,255,.16);
      box-shadow:var(--shadow-strong);
      transform:translateY(14px) scale(.985);
      transition:transform .24s ease;
      overflow:hidden;
      max-height:min(86vh, 760px);
      overflow-y:auto;
    }

    .modal.open .modal-card{
      transform:translateY(0) scale(1);
    }

    .modal-card::before{
      content:"";
      position:absolute;
      width:160px;
      height:160px;
      top:-54px;
      right:-36px;
      background:radial-gradient(circle, rgba(255,214,95,.20), transparent 68%);
      filter:blur(14px);
      pointer-events:none;
    }

    .modal-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      position:relative;
      z-index:1;
    }

    .modal-title{
      margin:0;
      font-size:1.18rem;
      font-weight:900;
      line-height:1.14;
      letter-spacing:.01em;
    }

    .modal-price{
      padding:8px 11px;
      border-radius:999px;
      white-space:nowrap;
      font-size:.92rem;
      font-weight:900;
      color:#fff1ad;
      background:rgba(255,215,110,.13);
      border:1px solid rgba(255,215,110,.32);
      box-shadow:0 10px 22px rgba(0,0,0,.12);
    }

    .modal-desc{
      position:relative;
      z-index:1;
      margin:10px 0 0;
      color:var(--muted);
      line-height:1.54;
      font-size:.97rem;
    }

    .modal-options{
      position:relative;
      z-index:1;
      margin-top:14px;
      display:grid;
      gap:12px;
    }

    .option-group{
      border-radius:18px;
      padding:12px;
      background:linear-gradient(180deg, rgba(255,255,255,.11), rgba(255,255,255,.06));
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 10px 20px rgba(0,0,0,.08);
    }

    .option-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-bottom:10px;
    }

    .option-title{
      font-size:.96rem;
      font-weight:900;
      color:#fff;
      line-height:1.2;
    }

    .option-badge{
      flex:0 0 auto;
      font-size:.72rem;
      font-weight:900;
      color:#2b1a00;
      background:linear-gradient(135deg, #ffe082, #ffca28);
      border-radius:999px;
      padding:6px 9px;
      box-shadow:0 8px 16px rgba(255,193,7,.18);
    }

    .option-note{
      font-size:.78rem;
      line-height:1.45;
      color:rgba(255,255,255,.78);
      margin:0 0 10px;
    }

    .choice-list{
      display:grid;
      gap:8px;
    }

    .choice-item{
      position:relative;
    }

    .choice-input{
      position:absolute;
      opacity:0;
      pointer-events:none;
    }

    .choice-card{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      min-height:56px;
      border-radius:15px;
      padding:10px 12px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.10);
      transition:transform .16s ease, border-color .16s ease, background .16s ease, box-shadow .16s ease;
      cursor:pointer;
    }

    .choice-card:active{
      transform:scale(.99);
    }

    .choice-main{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
      flex:1;
    }

    .choice-mark{
      width:20px;
      height:20px;
      flex:0 0 20px;
      border-radius:999px;
      border:2px solid rgba(255,255,255,.35);
      background:rgba(255,255,255,.04);
      display:grid;
      place-items:center;
      transition:all .16s ease;
    }

    .choice-mark.checkbox{
      border-radius:7px;
    }

    .choice-mark::after{
      content:"";
      width:8px;
      height:8px;
      border-radius:999px;
      background:#ffcf4f;
      transform:scale(0);
      transition:transform .16s ease;
      box-shadow:0 0 16px rgba(255,207,79,.45);
    }

    .choice-mark.checkbox::after{
      width:9px;
      height:9px;

    /* =========================
       BOTTOM UI

      position:fixed;

  <script>
    const DISHES = {
      "zerbian-simple": {

    const OPTIONAL_DRINK_EXTRA = 1.00; // سعر المشروب للسامبل والماكسي
    const EXTRA_SAUCE_PRICE = 0.50;    // كل صوص إضافي بعد أول واحد

    const DRINK_IMAGES = {
      cola: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="%23f44336"/><stop offset="1" stop-color="%23b71c1c"/></linearGradient></defs><rect width="64" height="64" rx="14" fill="%231d1026"/><rect x="22" y="8" width="20" height="48" rx="8" fill="url(%23g)" stroke="%23ffd9d9" stroke-width="2"/><rect x="26" y="4" width="12" height="8" rx="3" fill="%23d7d7d7"/><text x="32" y="37" font-size="12" text-anchor="middle" fill="white" font-family="Arial" font-weight="700">COLA</text></svg>',
      "cola-zero": 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="%23333333"/><stop offset="1" stop-color="%23000000"/></linearGradient></defs><rect width="64" height="64" rx="14" fill="%23101822"/><rect x="22" y="8" width="20" height="48" rx="8" fill="url(%23g)" stroke="%23d7d7d7" stroke-width="2"/><rect x="26" y="4" width="12" height="8" rx="3" fill="%23cfcfcf"/><text x="32" y="30" font-size="10" text-anchor="middle" fill="white" font-family="Arial" font-weight="700">ZERO</text><text x="32" y="41" font-size="9" text-anchor="middle" fill="%23ff6b6b" font-family="Arial" font-weight="700">COLA</text></svg>',
      "ice-tea": 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="%23ffcc80"/><stop offset="1" stop-color="%23fb8c00"/></linearGradient></defs><rect width="64" height="64" rx="14" fill="%23141822"/><rect x="18" y="10" width="28" height="44" rx="8" fill="url(%23g)" stroke="%23fff3d0" stroke-width="2"/><path d="M39 8 L48 16" stroke="%23c7f0ff" stroke-width="3" stroke-linecap="round"/><circle cx="24" cy="18" r="4" fill="%23fff59d"/><text x="32" y="38" font-size="11" text-anchor="middle" fill="%233b2400" font-family="Arial" font-weight="700">TEA</text></svg>',
      oasis: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="%23fff176"/><stop offset="1" stop-color="%23fbc02d"/></linearGradient></defs><rect width="64" height="64" rx="14" fill="%23121b12"/><rect x="18" y="10" width="28" height="44" rx="8" fill="url(%23g)" stroke="%23fff9c4" stroke-width="2"/><path d="M32 12 C38 8, 41 8, 44 14" stroke="%234caf50" stroke-width="3" fill="none" stroke-linecap="round"/><text x="32" y="38" font-size="11" text-anchor="middle" fill="%235b4300" font-family="Arial" font-weight="700">OASIS</text></svg>'
    };

    const DRINKS = [
      { id: "cola", name: "Cola", image: DRINK_IMAGES["cola"] },
      { id: "cola-zero", name: "Cola Zero", image: DRINK_IMAGES["cola-zero"] },
      { id: "ice-tea", name: "Ice Tea", image: DRINK_IMAGES["ice-tea"] },
      { id: "oasis", name: "Oasis", image: DRINK_IMAGES["oasis"] }
    ];

    const DESSERTS = [
      { id: "basbousa", name: "Basbousa" }
    ];

    const SAUCES = [
      { id: "daqoos", name: "Daqoos" },
      { id: "labneh", name: "Labneh" },
      { id: "sahawiq", name: "Sahawiq" }
    ];

    const intro = document.getElementById("intro");
    const app = document.getElementById("app");
    const modal = document.getElementById("modal");
    const modalTitle = document.getElementById("modalTitle");
    const modalPrice = document.getElementById("modalPrice");
    const modalDesc = document.getElementById("modalDesc");
    const modalOptions = document.getElementById("modalOptions");
    const modalAlert = document.getElementById("modalAlert");
    const addToCartBtn = document.getElementById("addToCartBtn");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const cartCount = document.getElementById("cartCount");
    const cartItems = document.getElementById("cartItems");
    const whatsappBtn = document.getElementById("whatsappBtn");
    const imageFrame = document.getElementById("imageFrame");
    const hotspots = document.querySelectorAll(".hotspot");

    let selectedDish = null;
    let selectedConfig = null;
    const cart = {};

    function setAppHeight(){
      const vh = window.innerHeight;
      document.documentElement.style.setProperty("--app-h", `${vh}px`);
    }

    function syncHotspotArtwork(){
      if (!imageFrame) return;

      const frameRect = imageFrame.getBoundingClientRect();
      const frameW = Math.max(frameRect.width, 1);
      const frameH = Math.max(frameRect.height, 1);

      hotspots.forEach((btn, index) => {
        const left = btn.offsetLeft;
        const top = btn.offsetTop;

        btn.style.setProperty("--bg-w", `${frameW}px ${frameH}px`);
        btn.style.setProperty("--bg-wx", `${frameW}px`);
        btn.style.setProperty("--bg-hy", `${frameH}px`);
        btn.style.setProperty("--bg-x", `${-left}px`);
        btn.style.setProperty("--bg-y", `${-top}px`);

        const radius = getComputedStyle(btn).borderRadius || "18px";
        btn.style.setProperty("--piece-radius", radius);

        const delay = (index % 4) * 0.28;
        btn.style.animationDelay = `${delay}s`;
        btn.style.setProperty("--anim-delay", `${delay}s`);
        btn.style.setProperty("--piece-opacity", "1");
      });
    }

    function resetHotspotTilt(btn){
      btn.style.setProperty("--rx", "0deg");
      btn.style.setProperty("--ry", "0deg");
    }

    function handlePointerTilt(event, btn){
      const rect = btn.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      const px = (x / rect.width) - 0.5;
      const py = (y / rect.height) - 0.5;

      const ry = (px * 4.2).toFixed(2);
      const rx = (py * -4.2).toFixed(2);

      btn.style.setProperty("--rx", `${rx}deg`);
      btn.style.setProperty("--ry", `${ry}deg`);
    }

    function parseEuro(value){
      return Number(
        String(value)
          .replace(/[^\d,.-]/g, "")
          .replace(",", ".")
      ) || 0;
    }

    function formatEuro(value){
      return `${value.toFixed(2).replace(".", ",")} €`;
    }

    function escapeHtml(str){
      return String(str).replace(/[&<>"']/g, ch => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#39;"
      }[ch]));
    }

    function getDishCategory(id){
      return DISHES[id]?.category || "";
    }

    function getDefaultConfig(id){
      const category = getDishCategory(id);

      if (category === "single"){
        return {
          drink: "",
          dessert: "",
          sauces: []
        };
      }

      if (category === "box"){
        return {
          drink: DRINKS[0].id,
          dessert: DESSERTS[0].id,
          sauces: [SAUCES[0].id]
        };
      }

      return {
        drink: "",
        dessert: "",
        sauces: []
      };
    }

    function getDrinkById(id){
      return DRINKS.find(item => item.id === id) || null;
    }

    function getDessertById(id){
      return DESSERTS.find(item => item.id === id) || null;
    }

    function getSauceById(id){
      return SAUCES.find(item => item.id === id) || null;
    }

    function renderDrinkOptions(required = false, selected = ""){
      const noneOption = required ? "" : `
        <label class="choice-item">
          <input class="choice-input" type="radio" name="drinkChoice" value="" ${selected === "" ? "checked" : ""}>
          <div class="choice-card">
            <div class="choice-main">
              <div class="choice-mark"></div>
              <div class="choice-thumb" style="display:grid;place-items:center;font-size:18px;">🚫</div>
              <div class="choice-text">
                <div class="choice-name">Sans boisson</div>
                <div class="choice-sub">Vous pouvez continuer sans choisir</div>
              </div>
            </div>
            <div class="choice-price">+0,00 €</div>
          </div>
        </label>
      `;

      const items = DRINKS.map(drink => {
        const priceText = required ? "Inclus" : `+${formatEuro(OPTIONAL_DRINK_EXTRA)}`;
        const subText = required ? "Choix obligatoire pour la box" : "Option supplémentaire payante";

        return `
          <label class="choice-item">
            <input class="choice-input" type="radio" name="drinkChoice" value="${drink.id}" ${selected === drink.id ? "checked" : ""}>
            <div class="choice-card">
              <div class="choice-main">
                <div class="choice-mark"></div>
                <img class="choice-thumb" src="${drink.image}" alt="${escapeHtml(drink.name)}">
                <div class="choice-text">
                  <div class="choice-name">${escapeHtml(drink.name)}</div>
                  <div class="choice-sub">${subText}</div>
                </div>
              </div>
              <div class="choice-price">${priceText}</div>
            </div>
          </label>
        `;
      }).join("");

      return `
        <div class="option-group">
          <div class="option-head">
            <div class="option-title">Boisson</div>
            <div class="option-badge">${required ? "Obligatoire" : "Option"}</div>
          </div>
          <p class="option-note">
            ${required
              ? "Choisissez une seule boisson pour votre box."
              : "Vous pouvez ajouter une boisson. Cette option augmente le prix."}
          </p>
          <div class="choice-list">
            ${noneOption}
            ${items}
          </div>
        </div>
      `;
    }

    function renderDessertOptions(selected = ""){
      return `
        <div class="option-group">
          <div class="option-head">
            <div class="option-title">Dessert</div>
            <div class="option-badge">Inclus</div>
          </div>
          <p class="option-note">
            Le dessert est obligatoire pour la box, sans coût supplémentaire.
          </p>
          <div class="choice-list">
            ${DESSERTS.map(dessert => `
              <label class="choice-item">
                <input class="choice-input" type="radio" name="dessertChoice" value="${dessert.id}" ${selected === dessert.id ? "checked" : ""}>
                <div class="choice-card">
                  <div class="choice-main">
                    <div class="choice-mark"></div>
                    <div class="choice-thumb" style="display:grid;place-items:center;font-size:18px;">🍰</div>
                    <div class="choice-text">
                      <div class="choice-name">${escapeHtml(dessert.name)}</div>
                      <div class="choice-sub">Dessert inclus dans la box</div>
                    </div>
                  </div>
                  <div class="choice-price">Inclus</div>
                </div>
              </label>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderSauceOptions(selectedSauces = [], requiredAtLeastOne = false){
      return `
        <div class="option-group">
          <div class="option-head">
            <div class="option-title">Sauces</div>
            <div class="option-badge">1 gratuite</div>
          </div>
          <p class="option-note">
            Une sauce est gratuite. Chaque sauce supplémentaire coûte +${formatEuro(EXTRA_SAUCE_PRICE)}.
            ${requiredAtLeastOne ? " Pour la box, choisissez au moins une sauce." : " Pour le simple et le max, vous pouvez aussi choisir vos sauces ici."}
          </p>
          <div class="choice-list">
            ${SAUCES.map(sauce => `
              <label class="choice-item">
                <input class="choice-input" type="checkbox" name="sauceChoice" value="${sauce.id}" ${selectedSauces.includes(sauce.id) ? "checked" : ""}>
                <div class="choice-card">
                  <div class="choice-main">
                    <div class="choice-mark checkbox"></div>
                    <div class="choice-thumb" style="display:grid;place-items:center;font-size:17px;">🥣</div>
                    <div class="choice-text">
                      <div class="choice-name">${escapeHtml(sauce.name)}</div>
                      <div class="choice-sub">1 gratuite, puis supplément</div>
                    </div>
                  </div>
                  <div class="choice-price">+0 / +0,50 €</div>
                </div>
              </label>
            `).join("")}
          </div>
          <div class="inline-summary" id="sauceSummary"></div>
        </div>
      `;
    }

    function renderModalOptions(id){
      const category = getDishCategory(id);
      const config = selectedConfig || getDefaultConfig(id);

      if (category === "single"){
        modalOptions.innerHTML = `
          ${renderDrinkOptions(false, config.drink)}
          ${renderSauceOptions(config.sauces, false)}
        `;
        renderSauceSummary(config.sauces);
        return;
      }

      if (category === "box"){
        modalOptions.innerHTML = `
          ${renderDrinkOptions(true, config.drink)}
          ${renderDessertOptions(config.dessert)}
          ${renderSauceOptions(config.sauces, true)}
        `;
        renderSauceSummary(config.sauces);
        return;
      }

      modalOptions.innerHTML = "";
    }

    function readConfigFromModal(id){
      const category = getDishCategory(id);
      const config = getDefaultConfig(id);

      if (category === "single"){
        const drinkEl = modal.querySelector('input[name="drinkChoice"]:checked');
        const sauceEls = [...modal.querySelectorAll('input[name="sauceChoice"]:checked')];
        config.drink = drinkEl ? drinkEl.value : "";
        config.sauces = sauceEls.map(el => el.value);
        return config;
      }

      if (category === "box"){
        const drinkEl = modal.querySelector('input[name="drinkChoice"]:checked');
        const dessertEl = modal.querySelector('input[name="dessertChoice"]:checked');
        const sauceEls = [...modal.querySelectorAll('input[name="sauceChoice"]:checked')];

        config.drink = drinkEl ? drinkEl.value : "";
        config.dessert = dessertEl ? dessertEl.value : "";
        config.sauces = sauceEls.map(el => el.value);

        return config;
      }

      return config;
    }

    function getExtrasTotal(id, config){
      const category = getDishCategory(id);
      let extras = 0;

      if ((category === "single" || category === "box") && config.drink){
        if (category === "single") {
          extras += OPTIONAL_DRINK_EXTRA;
        }
      }

      if (category === "single" || category === "box"){
        const extraSauceCount = Math.max((config.sauces || []).length - 1, 0);
        extras += extraSauceCount * EXTRA_SAUCE_PRICE;
      }

      return extras;
    }

    function getItemTotal(id, config){
      const base = parseEuro(DISHES[id].price);
      return base + getExtrasTotal(id, config);
    }

    function isModalSelectionValid(id, config){
      const category = getDishCategory(id);

      if (category === "single"){
        return true;
      }

      if (category === "box"){
        return Boolean(config.drink) && Boolean(config.dessert) && Array.isArray(config.sauces) && config.sauces.length > 0;
      }

      return true;
    }

    function renderSauceSummary(sauces = []){
      const summary = document.getElementById("sauceSummary");
      if (!summary) return;

      if (!sauces.length){
        summary.innerHTML = `<div class="summary-pill">Aucune sauce choisie</div><div class="summary-pill accent">Supplément sauces: Inclus</div>`;
        return;
      }

      const extraCount = Math.max(sauces.length - 1, 0);
      const extraPrice = extraCount * EXTRA_SAUCE_PRICE;
      const names = sauces.map(id => getSauceById(id)?.name).filter(Boolean);

      summary.innerHTML = `
        ${names.map(name => `<div class="summary-pill">${escapeHtml(name)}</div>`).join("")}
        <div class="summary-pill accent">
          Supplément sauces: ${extraPrice > 0 ? "+" + formatEuro(extraPrice) : "Inclus"}
        </div>
      `;
    }

    function updateModalState(){
      if (!selectedDish) return;

      selectedConfig = readConfigFromModal(selectedDish);
      const total = getItemTotal(selectedDish, selectedConfig);

      modalPrice.textContent = formatEuro(total);
      addToCartBtn.textContent = `Ajouter au panier • ${formatEuro(total)}`;

      const isValid = isModalSelectionValid(selectedDish, selectedConfig);
      addToCartBtn.disabled = !isValid;

      if (!isValid && getDishCategory(selectedDish) === "box"){
        modalAlert.textContent = "Veuillez choisir une boisson, un dessert et au moins une sauce pour continuer.";
        modalAlert.classList.add("show");
      } else {
        modalAlert.textContent = "";
        modalAlert.classList.remove("show");
      }

      renderSauceSummary(selectedConfig.sauces || []);
    }

    function buildSelectionLabel(id, config){
      const category = getDishCategory(id);
      const parts = [];

      if (config.drink){
        const drink = getDrinkById(config.drink);
        if (drink) {
          const extra = category === "single" ? ` (+${formatEuro(OPTIONAL_DRINK_EXTRA)})` : "";
          parts.push(`Boisson: ${drink.name}${extra}`);
        }
      }

      if (category === "box"){
        const dessert = getDessertById(config.dessert);
        if (dessert) parts.push(`Dessert: ${dessert.name}`);
      }

      if (config.sauces?.length){
        const sauceNames = config.sauces
          .map(sauceId => getSauceById(sauceId)?.name)
          .filter(Boolean)
          .join(", ");
        if (sauceNames) parts.push(`Sauces: ${sauceNames}`);
      }

      const extraSauceCount = Math.max((config.sauces || []).length - 1, 0);
      if (extraSauceCount > 0){
        parts.push(`Supplément sauces: +${formatEuro(extraSauceCount * EXTRA_SAUCE_PRICE)}`);
      }

      return parts.join(" • ");
    }

    function buildCartKey(id, config){
      const sauces = [...(config.sauces || [])].sort().join("+") || "none";
      return `${id}__drink:${config.drink || "none"}__dessert:${config.dessert || "none"}__sauces:${sauces}`;
    }

    function cloneConfig(config){
      return JSON.parse(JSON.stringify(config || {}));
    }

    setAppHeight();
    window.addEventListener("resize", () => {
      setAppHeight();
      syncHotspotArtwork();
    });

    window.addEventListener("orientationchange", () => {
      setTimeout(() => {
        setAppHeight();
        syncHotspotArtwork();
      }, 120);
    });

    window.addEventListener("load", () => {
      setAppHeight();
      syncHotspotArtwork();

      setTimeout(() => {
        intro.classList.add("hide");
        app.classList.add("ready");
        syncHotspotArtwork();
      }, 2550);

      setTimeout(syncHotspotArtwork, 300);
      setTimeout(syncHotspotArtwork, 900);
    });

    function openModal(id, triggerEl){
      const item = DISHES[id];
      if (!item) return;

      selectedDish = id;
      selectedConfig = getDefaultConfig(id);

      hotspots.forEach(el => el.classList.remove("active"));
      if (triggerEl) triggerEl.classList.add("active");

      modalTitle.textContent = item.name;
      modalDesc.textContent = item.description;

      renderModalOptions(id);
      updateModalState();

      modal.classList.add("open");
      modal.setAttribute("aria-hidden", "false");
    }

    function closeModal(){
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");
      modalOptions.innerHTML = "";
      modalAlert.textContent = "";
      modalAlert.classList.remove("show");
      selectedConfig = null;
      hotspots.forEach(el => el.classList.remove("active"));
    }

    hotspots.forEach(btn => {
      btn.addEventListener("click", () => openModal(btn.dataset.id, btn));

      btn.addEventListener("touchstart", () => {
        btn.classList.add("active");
      }, { passive: true });

      btn.addEventListener("touchend", () => {
        setTimeout(() => btn.classList.remove("active"), 120);
      }, { passive: true });

      btn.addEventListener("pointermove", (e) => {
        if (window.matchMedia("(hover:hover) and (pointer:fine)").matches) {
          handlePointerTilt(e, btn);
        }
      });

      btn.addEventListener("pointerleave", () => {
        resetHotspotTilt(btn);
      });

      btn.addEventListener("blur", () => {
        resetHotspotTilt(btn);
      });
    });

    modalOptions.addEventListener("change", () => {
      updateModalState();
    });

    closeModalBtn.addEventListener("click", closeModal);

    modal.addEventListener("click", (e) => {
      if (e.target === modal) closeModal();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeModal();
    });

    function renderCart(){
      const entries = Object.values(cart);
      const totalQty = entries.reduce((sum, entry) => sum + entry.qty, 0);
      cartCount.textContent = totalQty;

      if (!entries.length){
        cartItems.innerHTML = '<div class="cart-empty">Aucun article sélectionné.</div>';
        return;
      }

      cartItems.innerHTML = entries.map(entry => {
        const item = DISHES[entry.id];
        const summary = buildSelectionLabel(entry.id, entry.config);

        return `
          <div class="cart-item">
            ${item.name}
            ${summary ? ` — ${summary}` : ""}
            × ${entry.qty}
          </div>
        `;
      }).join("");
    }

    addToCartBtn.addEventListener("click", () => {
      if (!selectedDish) return;

      selectedConfig = readConfigFromModal(selectedDish);

      if (!isModalSelectionValid(selectedDish, selectedConfig)){
        updateModalState();
        return;
      }

      const key = buildCartKey(selectedDish, selectedConfig);
      const lineTotal = getItemTotal(selectedDish, selectedConfig);

      if (cart[key]){
        cart[key].qty += 1;
      } else {
        cart[key] = {
          id: selectedDish,
          config: cloneConfig(selectedConfig),
          qty: 1,
          lineTotal
        };
      }

      renderCart();
      pulseWhatsApp();
      closeModal();
    });

    function pulseWhatsApp(){
      whatsappBtn.animate(
        [
          { transform: "scale(1)" },
          { transform: "scale(1.018)" },
          { transform: "scale(1)" }
        ],
        { duration: 340, easing: "ease-out" }
      );
    }

    whatsappBtn.addEventListener("click", () => {
      const entries = Object.values(cart);

      if (!entries.length){
        alert("Veuillez d’abord ajouter au moins un article au panier.");
        return;
      }

      const lines = entries.map((entry, index) => {
        const item = DISHES[entry.id];
        const summary = buildSelectionLabel(entry.id, entry.config);
        const unitTotal = formatEuro(entry.lineTotal);

        return [
          `${index + 1}. ${item.name} x${entry.qty}`,
          summary ? `   - ${summary}` : "",
          `   - Prix unitaire: ${unitTotal}`
        ].filter(Boolean).join("\n");
      });

      const grandTotal = entries.reduce((sum, entry) => sum + (entry.lineTotal * entry.qty), 0);

      const message =
`Bonjour Yamani Food,
Je souhaite commander :

${lines.join("\n\n")}

Total estimé : ${formatEuro(grandTotal)}

Merci !`;

      const phone = "33749773595";
      const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
      window.open(url, "_blank");
    });

    renderCart();
  </script>
</body>
</html>
