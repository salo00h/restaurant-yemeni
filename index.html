<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Yamani Food</title>
  <style>
    :root{
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --text: #fff8f0;
      --glass: rgba(255,255,255,.12);
      --glass-2: rgba(255,255,255,.18);
      --line: rgba(255,255,255,.18);
      --shadow: 0 18px 50px rgba(0,0,0,.35);
      --shadow-strong: 0 20px 70px rgba(0,0,0,.48);
      --wa: #25D366;
      --accent: #ffbf1f;
      --accent-2: #ff7a00;
      --bg: #12070f;
    }

    *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    html,body{
      margin:0; height:100%; background:#000; color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Arial,sans-serif;
      overscroll-behavior:none;
    }
    body{ overflow:hidden; }

    button{ font:inherit; }
    img{ display:block; }

    .app{
      position:fixed; inset:0; overflow:hidden;
      background:#000;
    }

    /* Intro */
    .intro{
      position:fixed; inset:0; z-index:100;
      display:flex; align-items:center; justify-content:center;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,190,50,.18), transparent 28%),
        radial-gradient(circle at 80% 20%, rgba(166,83,255,.18), transparent 30%),
        radial-gradient(circle at 50% 100%, rgba(255,92,92,.14), transparent 40%),
        linear-gradient(135deg, #2a1242 0%, #180a2a 45%, #0d0616 100%);
      transition: opacity .8s ease, visibility .8s ease;
      overflow:hidden;
    }
    .intro.hide{ opacity:0; visibility:hidden; pointer-events:none; }
    .intro-inner{
      width:min(92vw, 520px);
      padding:22px 18px calc(18px + var(--safe-bottom));
      text-align:center;
    }
    .intro-title{
      margin:0 0 8px;
      font-size:clamp(2rem, 9vw, 3.5rem);
      font-weight:900;
      letter-spacing:.03em;
      text-shadow:0 12px 24px rgba(0,0,0,.35);
    }
    .intro-sub{
      margin:0 0 24px;
      font-size:clamp(.95rem, 4vw, 1.1rem);
      opacity:.9;
    }
    .chef-track{
      position:relative;
      height:110px;
      border-radius:999px;
      background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
      border:1px solid rgba(255,255,255,.14);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.10), 0 20px 60px rgba(0,0,0,.25);
      overflow:hidden;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .chef-track::before{
      content:"";
      position:absolute; inset:auto 0 12px 0; height:2px;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.28), transparent);
    }
    .chef{
      position:absolute;
      left:-22%;
      top:18px;
      font-size:3.4rem;
      line-height:1;
      filter:drop-shadow(0 10px 16px rgba(0,0,0,.35));
      animation: chefWalk 2.7s cubic-bezier(.55,.06,.31,.99) forwards, chefBob .55s ease-in-out infinite;
      will-change: transform, left;
    }
    .chef-hat{
      position:absolute;
      right:18px;
      top:14px;
      font-size:1.5rem;
      opacity:.55;
      animation: pulseSoft 1.6s ease-in-out infinite;
    }
    .intro-loading{
      margin-top:16px;
      font-size:.92rem;
      letter-spacing:.08em;
      text-transform:uppercase;
      opacity:.82;
    }
    .dots::after{
      content:"";
      display:inline-block;
      width:1.2em;
      text-align:left;
      animation:dots 1.2s steps(4,end) infinite;
    }

    @keyframes chefWalk{
      0%{ left:-24%; transform:translateY(0) scale(.95) rotateY(0deg); }
      100%{ left:108%; transform:translateY(0) scale(1.02) rotateY(0deg); }
    }
    @keyframes chefBob{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-6px); }
    }
    @keyframes pulseSoft{
      0%,100%{ transform:scale(1); opacity:.55; }
      50%{ transform:scale(1.08); opacity:.9; }
    }
    @keyframes dots{
      0%{ content:""; }
      25%{ content:"."; }
      50%{ content:".."; }
      75%{ content:"..."; }
      100%{ content:""; }
    }

    /* Main stage - mobile first */
    .stage{
      position:fixed; inset:0;
      display:flex; align-items:center; justify-content:center;
      padding: max(10px, var(--safe-top)) max(8px, var(--safe-right)) calc(118px + var(--safe-bottom)) max(8px, var(--safe-left));
    }
    .image-frame{
      position:relative;
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      perspective:1200px;
      touch-action:manipulation;
      user-select:none;
    }
    .menu-image{
      max-width:100%;
      max-height:100%;
      width:auto;
      height:auto;
      object-fit:contain;
      pointer-events:none;
      user-select:none;
      -webkit-user-drag:none;
      filter: drop-shadow(0 20px 45px rgba(0,0,0,.28));
    }
    .hotspots-layer{
      position:absolute;
      pointer-events:none;
      inset:0;
    }

    .hotspot{
      position:absolute;
      border:0;
      background:transparent;
      border-radius:22px;
      pointer-events:auto;
      cursor:pointer;
      transform-style:preserve-3d;
      transition: transform .22s ease, filter .22s ease;
      outline:none;
      min-width:44px;
      min-height:44px;
      touch-action:manipulation;
    }
    .hotspot::before,
    .hotspot::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      pointer-events:none;
      transition: opacity .22s ease, transform .22s ease, box-shadow .22s ease;
    }
    .hotspot::before{
      background:
        radial-gradient(circle at 50% 35%, rgba(255,255,255,.18), rgba(255,255,255,.03) 62%, transparent 78%);
      opacity:.18;
    }
    .hotspot::after{
      opacity:0;
      box-shadow:
        0 12px 20px rgba(0,0,0,.18),
        0 28px 52px rgba(0,0,0,.18),
        inset 0 0 0 1px rgba(255,255,255,.10);
      backdrop-filter: blur(1px);
      -webkit-backdrop-filter: blur(1px);
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
    }
    .hotspot:active,
    .hotspot.is-active,
    .hotspot:focus-visible{
      transform: translateY(-4px) scale(1.02) translateZ(16px);
      filter: drop-shadow(0 14px 24px rgba(0,0,0,.30)) drop-shadow(0 24px 50px rgba(0,0,0,.18));
    }
    .hotspot:active::before,
    .hotspot.is-active::before,
    .hotspot:focus-visible::before{
      opacity:.5;
      transform: scale(1.02);
    }
    .hotspot:active::after,
    .hotspot.is-active::after,
    .hotspot:focus-visible::after{
      opacity:1;
    }

    /* Bottom mobile dock */
    .dock{
      position:fixed;
      left:0; right:0; bottom:0;
      z-index:30;
      padding:
        8px calc(12px + var(--safe-right))
        calc(10px + var(--safe-bottom))
        calc(12px + var(--safe-left));
      pointer-events:none;
    }
    .dock-inner{
      max-width:700px;
      margin:0 auto;
      display:grid;
      gap:8px;
      pointer-events:auto;
    }

    .cart-bar{
      display:grid;
      grid-template-columns:1fr auto;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-radius:22px;
      background:rgba(16,16,16,.62);
      border:1px solid rgba(255,255,255,.12);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .cart-main{
      min-width:0;
    }
    .cart-top{
      display:flex; align-items:center; gap:8px; flex-wrap:wrap;
      margin-bottom:4px;
    }
    .cart-count{
      display:inline-flex; align-items:center; justify-content:center;
      min-width:24px; height:24px; padding:0 8px;
      border-radius:999px;
      font-size:.84rem; font-weight:800;
      background:linear-gradient(135deg, var(--accent), var(--accent-2));
      color:#241200;
      box-shadow:0 8px 18px rgba(255,156,42,.28);
    }
    .cart-title{
      font-size:.95rem;
      font-weight:800;
      letter-spacing:.01em;
    }
    .cart-items{
      font-size:.84rem;
      line-height:1.35;
      opacity:.92;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .cart-clear{
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.08);
      color:#fff;
      border-radius:14px;
      padding:10px 12px;
      font-weight:700;
      min-height:44px;
    }

    .whatsapp-btn{
      display:flex; align-items:center; justify-content:center; gap:10px;
      min-height:52px;
      border:0;
      border-radius:18px;
      color:#fff;
      text-decoration:none;
      font-weight:900;
      letter-spacing:.01em;
      padding:14px 16px;
      background:linear-gradient(135deg, #21c85f, #17a34a);
      box-shadow:0 14px 34px rgba(37,211,102,.28);
      border:1px solid rgba(255,255,255,.10);
    }
    .whatsapp-btn span{ font-size:1.08rem; }

    /* Modal */
    .modal{
      position:fixed; inset:0; z-index:60;
      display:none;
    }
    .modal.show{ display:block; }
    .modal-backdrop{
      position:absolute; inset:0;
      background:rgba(4,4,10,.58);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .modal-dialog{
      position:absolute;
      left:max(12px, calc(12px + var(--safe-left)));
      right:max(12px, calc(12px + var(--safe-right)));
      bottom:max(12px, calc(12px + var(--safe-bottom)));
      border-radius:26px;
      background:rgba(22,22,28,.82);
      border:1px solid rgba(255,255,255,.12);
      box-shadow: var(--shadow-strong);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      overflow:hidden;
      transform: translateY(22px) scale(.98);
      opacity:0;
      transition: transform .28s ease, opacity .28s ease;
    }
    .modal.show .modal-dialog{
      transform: translateY(0) scale(1);
      opacity:1;
    }
    .modal-body{
      padding:18px 16px 16px;
    }
    .modal-row{
      display:flex; justify-content:space-between; align-items:flex-start; gap:12px;
      margin-bottom:10px;
    }
    .modal-title{
      margin:0;
      font-size:1.35rem;
      line-height:1.1;
      font-weight:900;
    }
    .modal-price{
      flex:0 0 auto;
      padding:8px 12px;
      border-radius:999px;
      background:linear-gradient(135deg, var(--accent), var(--accent-2));
      color:#271600;
      font-weight:900;
      box-shadow:0 10px 24px rgba(255,145,0,.28);
    }
    .modal-desc{
      margin:0 0 16px;
      font-size:1rem;
      line-height:1.6;
      color:rgba(255,248,240,.92);
    }
    .modal-actions{
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
    }
    .qty{
      display:inline-flex; align-items:center; justify-content:center;
      min-width:56px; padding:0 12px; min-height:50px;
      border-radius:16px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.10);
      font-weight:800;
      font-size:1.02rem;
    }
    .add-btn{
      min-height:50px;
      border:0;
      border-radius:16px;
      padding:12px 16px;
      background:linear-gradient(135deg, #ffd34d, #ff8c00);
      color:#281600;
      font-weight:900;
      box-shadow:0 12px 26px rgba(255,160,20,.28);
    }
    .close-btn{
      position:absolute;
      top:10px; right:10px;
      width:42px; height:42px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.08);
      color:#fff;
      font-size:1.2rem;
      z-index:2;
    }

    .sr-only{
      position:absolute !important;
      width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
    }

    @media (hover:hover) and (pointer:fine){
      .hotspot:hover{
        transform: translateY(-7px) scale(1.025) translateZ(18px);
        filter: drop-shadow(0 16px 28px rgba(0,0,0,.32)) drop-shadow(0 28px 56px rgba(0,0,0,.18));
      }
      .hotspot:hover::before{ opacity:.48; transform:scale(1.02); }
      .hotspot:hover::after{ opacity:1; }
      .whatsapp-btn:hover, .add-btn:hover, .cart-clear:hover{ filter:brightness(1.04); transform:translateY(-1px); }
    }

    @media (min-width: 768px){
      .stage{
        padding: max(16px, var(--safe-top)) max(16px, var(--safe-right)) calc(130px + var(--safe-bottom)) max(16px, var(--safe-left));
      }
      .dock-inner{
        grid-template-columns:1fr auto;
        align-items:end;
      }
      .whatsapp-btn{
        min-width:250px;
        min-height:60px;
      }
      .modal-dialog{
        left:50%;
        right:auto;
        bottom:max(18px, calc(18px + var(--safe-bottom)));
        width:min(520px, calc(100vw - 36px));
        transform:translateX(-50%) translateY(22px) scale(.98);
      }
      .modal.show .modal-dialog{
        transform:translateX(-50%) translateY(0) scale(1);
      }
      .modal-body{
        padding:22px 20px 20px;
      }
    }

    @media (prefers-reduced-motion: reduce){
      *, *::before, *::after{
        animation-duration:.01ms !important;
        animation-iteration-count:1 !important;
        transition-duration:.01ms !important;
        scroll-behavior:auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="intro" id="intro" aria-hidden="true">
    <div class="intro-inner">
      <h1 class="intro-title">Yamani Food</h1>
      <p class="intro-sub">Préparation d’une expérience mobile élégante et rapide.</p>
      <div class="chef-track">
        <div class="chef" aria-hidden="true">👨‍🍳</div>
        <div class="chef-hat" aria-hidden="true">✨</div>
      </div>
      <div class="intro-loading">Chargement<span class="dots"></span></div>
    </div>
  </div>

  <main class="app">
    <section class="stage" aria-label="Menu Yamani Food">
      <div class="image-frame" id="imageFrame">
        <img
          id="menuImage"
          class="menu-image"
          src="https://i.postimg.cc/tCnNnsh2/Whats-App-Image-2026-04-15-at-17-19-13.jpg"
          alt="Menu Yamani Food"
          width="1024"
          height="1536"
        />
        <div class="hotspots-layer" id="hotspotsLayer" aria-hidden="false"></div>
      </div>
    </section>

    <section class="dock" aria-label="Panier et commande">
      <div class="dock-inner">
        <div class="cart-bar">
          <div class="cart-main">
            <div class="cart-top">
              <span class="cart-count" id="cartCount">0</span>
              <span class="cart-title">Panier</span>
            </div>
            <div class="cart-items" id="cartItems">Aucun article sélectionné.</div>
          </div>
          <button class="cart-clear" id="clearCart" type="button">Vider</button>
        </div>
        <a class="whatsapp-btn" id="whatsappBtn" href="#" target="_blank" rel="noopener">
          <span aria-hidden="true">💬</span>
          <span>Commander via WhatsApp</span>
        </a>
      </div>
    </section>
  </main>

  <div class="modal" id="modal" aria-hidden="true">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalDesc">
      <button class="close-btn" id="closeModal" type="button" aria-label="Fermer">×</button>
      <div class="modal-body">
        <div class="modal-row">
          <h2 class="modal-title" id="modalTitle">Plat</h2>
          <div class="modal-price" id="modalPrice">0,00 €</div>
        </div>
        <p class="modal-desc" id="modalDesc"></p>
        <div class="modal-actions">
          <div class="qty" id="modalQty">Qté: 1</div>
          <button class="add-btn" id="addToCart" type="button">Ajouter au panier</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const MENU_IMAGE_URL = "https://i.postimg.cc/tCnNnsh2/Whats-App-Image-2026-04-15-at-17-19-13.jpg";
    const WHATSAPP_NUMBER = "33777263112";

    const products = [
      {
        id: "zerbian-simple",
        name: "Zerbian Simple",
        price: "4,99 €",
        description: "Un plat simple et savoureux, inspiré des saveurs yéménites, avec un riz parfumé et une portion généreuse de poulet épicé.",
        x: 4.6, y: 26.2, w: 43.2, h: 24.2, radius: 26
      },
      {
        id: "zerbian-max",
        name: "Zerbian Max",
        price: "6,99 €",
        description: "Une portion plus généreuse de Zerbian, idéale pour les grandes faims, avec un mélange riche d’épices et une texture gourmande.",
        x: 52.6, y: 26.0, w: 43.1, h: 24.5, radius: 26
      },
      {
        id: "box-simple",
        name: "Box Simple",
        price: "7,99 €",
        description: "Formule complète avec Zerbian, boisson et dessert. Un choix équilibré pour un repas rapide, pratique et délicieux.",
        x: 2.8, y: 50.3, w: 45.7, h: 25.8, radius: 28
      },
      {
        id: "box-max",
        name: "Box Max",
        price: "9,99 €",
        description: "La formule la plus généreuse avec Zerbian, boisson et dessert. Parfaite pour une expérience complète et gourmande.",
        x: 51.3, y: 50.1, w: 45.6, h: 26.0, radius: 28
      }
    ];

    const imageFrame = document.getElementById("imageFrame");
    const menuImage = document.getElementById("menuImage");
    const hotspotsLayer = document.getElementById("hotspotsLayer");
    const modal = document.getElementById("modal");
    const modalTitle = document.getElementById("modalTitle");
    const modalPrice = document.getElementById("modalPrice");
    const modalDesc = document.getElementById("modalDesc");
    const modalQty = document.getElementById("modalQty");
    const addToCartBtn = document.getElementById("addToCart");
    const closeModalBtn = document.getElementById("closeModal");
    const modalBackdrop = document.getElementById("modalBackdrop");
    const cartCount = document.getElementById("cartCount");
    const cartItems = document.getElementById("cartItems");
    const clearCartBtn = document.getElementById("clearCart");
    const whatsappBtn = document.getElementById("whatsappBtn");

    let activeProduct = null;
    const cart = new Map();

    function createHotspots(){
      hotspotsLayer.innerHTML = "";
      products.forEach(product => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "hotspot";
        btn.setAttribute("aria-label", `${product.name} - ${product.price}`);
        btn.dataset.id = product.id;
        btn.addEventListener("click", () => openProduct(product, btn));
        btn.addEventListener("touchstart", () => activateHotspot(btn), {passive:true});
        btn.addEventListener("mouseenter", () => activateHotspot(btn));
        btn.addEventListener("mouseleave", () => deactivateHotspot(btn));
        hotspotsLayer.appendChild(btn);
      });
      layoutHotspots();
    }

    function getDisplayedRect(){
      const frameRect = imageFrame.getBoundingClientRect();
      const imgRatio = 1024 / 1536;
      const frameRatio = frameRect.width / frameRect.height;
      let width, height, left, top;

      if(frameRatio > imgRatio){
        height = frameRect.height;
        width = height * imgRatio;
        top = 0;
        left = (frameRect.width - width) / 2;
      } else {
        width = frameRect.width;
        height = width / imgRatio;
        left = 0;
        top = (frameRect.height - height) / 2;
      }

      return { left, top, width, height };
    }

    function layoutHotspots(){
      const rect = getDisplayedRect();
      hotspotsLayer.style.left = rect.left + "px";
      hotspotsLayer.style.top = rect.top + "px";
      hotspotsLayer.style.width = rect.width + "px";
      hotspotsLayer.style.height = rect.height + "px";

      [...hotspotsLayer.children].forEach((btn, index) => {
        const p = products[index];
        btn.style.left = p.x + "%";
        btn.style.top = p.y + "%";
        btn.style.width = p.w + "%";
        btn.style.height = p.h + "%";
        btn.style.borderRadius = (p.radius || 22) + "px";
      });
    }

    function activateHotspot(btn){
      btn.classList.add("is-active");
      clearTimeout(btn._timer);
      btn._timer = setTimeout(() => btn.classList.remove("is-active"), 240);
    }
    function deactivateHotspot(btn){
      btn.classList.remove("is-active");
    }

    function openProduct(product, btn){
      activeProduct = product;
      activateHotspot(btn);
      modalTitle.textContent = product.name;
      modalPrice.textContent = product.price;
      modalDesc.textContent = product.description;
      modalQty.textContent = "Qté: 1";
      modal.classList.add("show");
      modal.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeModal(){
      modal.classList.remove("show");
      modal.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "hidden";
      activeProduct = null;
    }

    function addToCart(){
      if(!activeProduct) return;
      const current = cart.get(activeProduct.id) || { ...activeProduct, qty: 0 };
      current.qty += 1;
      cart.set(activeProduct.id, current);
      updateCart();
      closeModal();
    }

    function updateCart(){
      const items = [...cart.values()];
      const totalQty = items.reduce((sum, item) => sum + item.qty, 0);
      cartCount.textContent = totalQty;

      if(!items.length){
        cartItems.textContent = "Aucun article sélectionné.";
      } else {
        cartItems.textContent = items.map(item => `${item.name} x${item.qty}`).join(" • ");
      }

      const message = buildWhatsAppMessage(items);
      whatsappBtn.href = items.length
        ? `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`
        : `https://wa.me/${WHATSAPP_NUMBER}`;
    }

    function buildWhatsAppMessage(items){
      const lines = [
        "Bonjour Yamani Food,",
        "Je souhaite commander :",
        ""
      ];
      items.forEach(item => {
        lines.push(`- ${item.name} x${item.qty}`);
      });
      lines.push("", "Merci.");
      return lines.join("\n");
    }

    function clearCart(){
      cart.clear();
      updateCart();
    }

    addToCartBtn.addEventListener("click", addToCart);
    closeModalBtn.addEventListener("click", closeModal);
    modalBackdrop.addEventListener("click", closeModal);
    clearCartBtn.addEventListener("click", clearCart);

    document.addEventListener("keydown", (e) => {
      if(e.key === "Escape" && modal.classList.contains("show")) closeModal();
    });

    window.addEventListener("resize", layoutHotspots, { passive:true });
    window.addEventListener("orientationchange", () => setTimeout(layoutHotspots, 120), { passive:true });

    if(menuImage.complete){
      createHotspots();
    } else {
      menuImage.addEventListener("load", createHotspots, { once:true });
    }

    updateCart();

    window.addEventListener("load", () => {
      setTimeout(() => {
        document.getElementById("intro").classList.add("hide");
      }, 2400);
    });
  </script>
</body>
</html>
